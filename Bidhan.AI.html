<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bidhan.AI | Voice Enabled</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap');
        
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: radial-gradient(circle at top right, #0f172a, #020617);
            color: white;
            height: 100vh;
            overflow: hidden;
        }

        .glass {
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .ai-bubble {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px 20px 20px 4px;
        }

        .user-bubble {
            background: linear-gradient(135deg, #6366f1, #4f46e5);
            border-radius: 20px 20px 4px 20px;
        }

        /* Pulse animation for Microphone */
        .listening {
            animation: pulse-border 1.5s infinite;
            background: rgba(239, 68, 68, 0.2) !important;
            border-color: #ef4444 !important;
        }

        @keyframes pulse-border {
            0% { box-shadow: 0 0 0 0px rgba(99, 102, 241, 0.4); }
            100% { box-shadow: 0 0 0 15px rgba(99, 102, 241, 0); }
        }

        .typing-dot {
            width: 5px; height: 5px; background: #6366f1; border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out;
        }
        @keyframes bounce { 0%, 80%, 100% { transform: translateY(0); } 40% { transform: translateY(-5px); } }
    </style>
</head>
<body class="flex items-center justify-center p-4">

    <div class="glass w-full max-w-4xl h-[90vh] rounded-[2.5rem] flex flex-col overflow-hidden shadow-2xl">
        <header class="p-6 border-b border-white/5 flex justify-between items-center bg-white/[0.02]">
            <div class="flex items-center gap-4">
                <div class="w-12 h-12 bg-indigo-600 rounded-2xl flex items-center justify-center shadow-xl shadow-indigo-500/20">
                    <i class="fas fa-microphone-lines text-white text-xl"></i>
                </div>
                <div>
                    <h1 class="font-bold text-xl tracking-tight">Bidhan.AI</h1>
                    <p id="status-text" class="text-[10px] text-indigo-400 font-semibold uppercase tracking-widest flex items-center gap-1.5">
                        <span class="w-1.5 h-1.5 bg-indigo-400 rounded-full"></span> Ready
                    </p>
                </div>
            </div>
        </header>

        <div id="chat-window" class="flex-1 overflow-y-auto p-8 space-y-8">
            <div class="flex justify-start">
                <div class="ai-bubble p-5 max-w-[85%] border border-white/5">
                    <p class="text-sm leading-relaxed text-gray-200">System online. I am <b>Bidhan.AI</b>. You can type your request or click the microphone to speak to me.</p>
                </div>
            </div>
        </div>

        <div class="p-8 bg-black/20 border-t border-white/5">
            <div class="relative flex items-center gap-3">
                <div class="relative flex-1 group">
                    <input type="text" id="userInput" 
                        class="w-full bg-white/5 border border-white/10 rounded-2xl py-5 pl-7 pr-16 focus:outline-none focus:border-indigo-500/50 transition-all text-sm placeholder:text-gray-600"
                        placeholder="Speak or type to Bidhan.AI...">
                    
                    <button onclick="sendMessage()" 
                        class="absolute right-3 top-1/2 -translate-y-1/2 p-3 bg-indigo-600 hover:bg-indigo-500 rounded-xl transition-all active:scale-90">
                        <i class="fas fa-paper-plane text-white"></i>
                    </button>
                </div>

                <button id="voiceBtn" onclick="toggleVoice()" 
                    class="w-[60px] h-[60px] bg-white/5 border border-white/10 rounded-2xl flex items-center justify-center hover:bg-white/10 transition-all group">
                    <i class="fas fa-microphone text-gray-400 group-hover:text-indigo-400 text-lg"></i>
                </button>
            </div>
        </div>
    </div>

    <script>
        const API_KEY = "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";
        const chatWindow = document.getElementById('chat-window');
        const inputField = document.getElementById('userInput');
        const voiceBtn = document.getElementById('voiceBtn');
        const statusText = document.getElementById('status-text');

        // --- Voice Recognition Logic ---
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        let recognition;

        if (SpeechRecognition) {
            recognition = new SpeechRecognition();
            recognition.continuous = false;
            recognition.lang = 'en-US'; // Change to 'ne-NP' for Nepali support

            recognition.onstart = () => {
                voiceBtn.classList.add('listening');
                statusText.innerHTML = `<span class="w-1.5 h-1.5 bg-red-500 rounded-full animate-ping"></span> Listening...`;
                inputField.placeholder = "Listening to your voice...";
            };

            recognition.onresult = (event) => {
                const transcript = event.results[0][0].transcript;
                inputField.value = transcript;
                sendMessage(); // Auto-send after speaking
            };

            recognition.onend = () => {
                voiceBtn.classList.remove('listening');
                statusText.innerHTML = `<span class="w-1.5 h-1.5 bg-indigo-400 rounded-full"></span> Ready`;
                inputField.placeholder = "Speak or type to Bidhan.AI...";
            };

            recognition.onerror = (event) => {
                console.error("Speech Error:", event.error);
                voiceBtn.classList.remove('listening');
            };
        }

        function toggleVoice() {
            if (!SpeechRecognition) {
                alert("Voice recognition is not supported in this browser. Please use Chrome or Edge.");
                return;
            }
            recognition.start();
        }

        // --- Standard Chat Logic ---
        inputField.addEventListener("keypress", (e) => { if (e.key === "Enter") sendMessage(); });

        async function sendMessage() {
            const message = inputField.value.trim();
            if (!message) return;
            inputField.value = "";

            appendMessage('user', message);
            const loadingId = addLoading();

            try {
                const response = await fetch("https://openrouter.ai/api/v1/chat/completions", {
                    method: "POST",
                    headers: { "Authorization": `Bearer ${API_KEY}`, "Content-Type": "application/json" },
                    body: JSON.stringify({
                        "model": "google/gemini-2.0-flash-001",
                        "messages": [
                            { "role": "system", "content": "You are Bidhan.AI. A professional, brief, and helpful AI assistant." },
                            { "role": "user", "content": message }
                        ]
                    })
                });

                const data = await response.json();
                removeLoading(loadingId);

                if (data.choices && data.choices[0]) {
                    appendMessage('ai', data.choices[0].message.content);
                }
            } catch (error) {
                removeLoading(loadingId);
                appendMessage('ai', "Error connecting to Bidhan Core.");
            }
        }

        function appendMessage(role, text) {
            const div = document.createElement('div');
            div.className = `flex ${role === 'user' ? 'justify-end' : 'justify-start'}`;
            div.innerHTML = `<div class="${role === 'user' ? 'user-bubble' : 'ai-bubble'} p-5 max-w-[85%] border border-white/5 shadow-lg">
                <p class="text-sm leading-relaxed">${text}</p>
            </div>`;
            chatWindow.appendChild(div);
            chatWindow.scrollTo({ top: chatWindow.scrollHeight, behavior: 'smooth' });
        }

        function addLoading() {
            const id = 'l-' + Date.now();
            const div = document.createElement('div');
            div.id = id;
            div.className = 'flex justify-start';
            div.innerHTML = `<div class="ai-bubble p-5 flex gap-1.5 items-center"><div class="typing-dot"></div><div class="typing-dot" style="animation-delay: 0.2s"></div><div class="typing-dot" style="animation-delay: 0.4s"></div></div>`;
            chatWindow.appendChild(div);
            chatWindow.scrollTop = chatWindow.scrollHeight;
            return id;
        }

        function removeLoading(id) { const el = document.getElementById(id); if (el) el.remove(); }
    </script>
</body>
</html>
